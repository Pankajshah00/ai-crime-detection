<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Suspicious Activity Detection</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }

        .container {
            margin: 20px auto;
            width: 90%;
            max-width: 1000px;
        }

        #video-frame {
            width: 100%;
            max-width: 900px;
            border-radius: 10px;
            margin: 20px 0;
            border: 4px solid #fff;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
            color: white;
            background-color: #28a745;
        }

        button:hover {
            background-color: #218838;
        }

        input[type="file"] {
            display: none;
        }

        label.upload-btn {
            background-color: #007bff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            color: white;
        }

        .alerts {
            background: white;
            color: #333;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            text-align: left;
        }

        .alert {
            padding: 10px;
            border-left: 5px solid #dc3545;
            margin: 5px 0;
            background: #f8d7da;
            border-radius: 5px;
        }

        .alert.motion {
            border-left: 5px solid #ffc107;
            background: #fff3cd;
        }
    </style>
</head>
<body>
    <h1>🔒 AI Suspicious Activity Detection System</h1>

    <div class="container">
        <div class="controls">
            <button onclick="useCamera()">📷 Use Live Camera</button>
            <label for="upload-video" class="upload-btn">📁 Upload Video</label>
            <input type="file" id="upload-video" accept="video/*">
        </div>

        <img id="video-frame" src="" alt="Live Video Feed">

        <div class="alerts" id="alerts">
            <h3>🚨 Real-Time Alerts</h3>
        </div>
    </div>

    <script>
        const socket = io();
        const img = document.getElementById("video-frame");
        const alertsDiv = document.getElementById("alerts");
        const uploadInput = document.getElementById("upload-video");

        socket.on("frame", data => {
            if (data.image) {
                img.src = data.image;
            }
        });

        socket.on("alert", data => {
            const div = document.createElement("div");
            div.classList.add("alert");
            if (data.type.includes("Motion")) div.classList.add("motion");
            div.innerHTML = `<b>${data.type}</b> - ${data.time}<br>${data.label || data.motion || ""}`;
            alertsDiv.appendChild(div);
            alertsDiv.scrollTop = alertsDiv.scrollHeight;
        });

        function useCamera() {
            fetch("/switch_to_camera", { method: "POST" })
                .then(res => res.json())
                .then(data => alert(data.message));
        }

        uploadInput.addEventListener("change", () => {
            const file = uploadInput.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append("video", file);
            fetch("/upload_video", { method: "POST", body: formData })
                .then(res => res.json())
                .then(data => alert(data.message));
        });
    </script>
</body>
</html>
